<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Tourlocate</title>

  <!-- Leaflet & plugins CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-control-geocoder/dist/Control.Geocoder.css">

  <!-- Eigene Styles NACH den Bibliotheken (sonst überschreibt
       .leaflet-marker-icon{display:block} das Zentrieren der POI-Nummer) -->
  <link rel="stylesheet" href="css/style.css">

  <!-- Favicon (vermeidet 404) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'/>">

  <!-- Layout: Map muss Höhe haben -->
  <style>
    html, body { height: 100%; margin: 0; }
    body { display: flex; flex-direction: column; min-height: 100vh; }
    /* Toolbar behält natürliche Höhe; Karte füllt Rest */
    #map { flex: 1 1 auto; min-height: 300px; }
  </style>
</head>
<body>
  <div class="toolbar">
    <strong>Doppelklick / Rechtsklick (mobil: Tippen / lange drücken) = neue Station</strong>
    <button id="undoBtn" disabled>Letzte löschen</button>
    <button id="clearBtn" disabled>Alles löschen</button>
    <button id="importGeoBtn">GeoJSON importieren…</button>
    <button id="importGpxBtn">GPX importieren…</button>
    <button id="exportGeoBtn" disabled>GeoJSON</button>
    <button id="exportGpxBtn" disabled>GPX</button>
    <button id="exportHtmlBtn" disabled>Ein-Datei-HTML</button>
    <span id="routeinfo"></span>
  </div>

  <div id="map"></div>

  <!-- Versteckte Inputs -->
  <input type="file" id="imgInput"  accept="image/*" hidden>
  <input type="file" id="fileGeo" accept=".geojson,.json,application/geo+json,application/json" hidden>
  <input type="file" id="fileGpx"  accept=".gpx,application/gpx+xml,application/xml" hidden>

  <!-- JS libs (mit defer, Reihenfolge beachten) -->
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet-control-geocoder/dist/Control.Geocoder.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@tmcw/togeojson@5.8.1/dist/togeojson.umd.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js" defer></script>

  <!-- App (ES-Module; laufen nach den defer-Skripten oben) -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
