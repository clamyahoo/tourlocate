<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Tourlocate</title>

  <!-- Base styles -->
  <link rel="stylesheet" href="style.css">

  <!-- Leaflet & plugins CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-control-geocoder/dist/Control.Geocoder.css">

  <!-- Avoid favicon 404 noise (optional) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'/>">

  <!-- Ensure the map is visible (no 0px height) and layout is robust -->
  <style>
    html, body { height: 100%; margin: 0; }
    body { display: flex; flex-direction: column; min-height: 100vh; }
    /* Toolbar stays natural height; map fills the rest */
    #map { flex: 1 1 auto; min-height: 300px; }
  </style>
</head>
<body>
  <div class="toolbar">
    <strong>Doppelklick (mobil: lange Drücken) = neue Station</strong>
    <button id="undoBtn" disabled>Letzte löschen</button>
    <button id="clearBtn" disabled>Alles löschen</button>
    <button id="importGeoBtn">GeoJSON importieren…</button>
    <button id="importGpxBtn">GPX importieren…</button>
    <button id="exportGeoBtn" disabled>GeoJSON</button>
    <button id="exportGpxBtn" disabled>GPX</button>
    <button id="exportHtmlBtn" disabled>Ein-Datei-HTML</button>
    <span id="routeinfo"></span>
  </div>

  <div id="map"></div>
  <div id="legs"></div>

  <!-- Versteckte Inputs -->
  <input type="file" id="imgInput"  accept="image/*" hidden>
  <input type="file" id="fileGeo" accept=".geojson,.json,application/geo+json,application/json" hidden>
  <input type="file" id="fileGpx"  accept=".gpx,application/gpx+xml,application/xml" hidden>

  <!-- JS libs -->
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tmcw/togeojson@5.8.1/dist/togeojson.umd.js"></script>

  <!-- deine App (Cache-Busting durch ?v=…) -->
  <script src="map.js"></script>
</body>
</html>
